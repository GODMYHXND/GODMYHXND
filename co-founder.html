<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERBROKE GODMYHXND - House of GODMYHXND</title>
    <style>
        /* --- CSS เหมือนหน้าอื่นๆ แต่เปลี่ยนสีเน้นเป็นสีเหลืองทอง --- */
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #snow-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        .header { width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; box-sizing: border-box; }
        .page-title { font-size: 36px; font-weight: bold; margin: 0; color: #ffca28; text-transform: uppercase; } /* สีเหลืองทอง */
        .search-container { margin-top: 20px; width: 100%; max-width: 400px; }
        .search-input { width: 100%; padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; font-family: inherit; outline: none; text-transform: uppercase; }
        .search-input:focus { border-color: #ffca28; }
        .back-btn { padding: 8px 20px; border: 1px solid #444; color: #fff; text-decoration: none; font-size: 12px; background: rgba(255,255,255,0.05); }
        .back-btn:hover { background: #fff; color: #000; }

        /* Grid Layout */
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 95%; max-width: 1200px; padding: 40px 0; z-index: 5; }
        .card { background: rgba(15,15,15,0.8); border: 1px solid #222; height: 140px; display: flex; align-items: center; padding: 20px; box-sizing: border-box; position: relative; transition: 0.3s; }
        .card.hidden { display: none !important; }
        .card::before { content: ''; position: absolute; left: 0; top: 15%; width: 3px; height: 70%; background-color: #ffca28; opacity: 0.3; }
        .card:hover { border-color: #ffca28; transform: translateY(-5px); }
        .card-logo { width: 70px; height: 70px; background: #111; border: 1px solid #333; margin-right: 20px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        .card-logo img { max-width: 80%; opacity: 0.7; filter: grayscale(100%); }
        .card:hover .card-logo img { opacity: 1; filter: grayscale(0%); }
        .card-name { font-size: 14px; font-weight: bold; margin: 0; color: #fff; text-transform: uppercase; }
        .card-role { font-size: 11px; color: #666; margin: 4px 0; }
        .view-profile { font-size: 11px; color: #ffca28; text-decoration: none; margin-top: 10px; display: block; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 60px; z-index: 10; }
        .pagination button { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 12px; }
        .pagination button:hover:not(:disabled) { background: #fff; color: #000; }
        .pagination button:disabled { opacity: 0.2; cursor: not-allowed; }
        .page-info { color: #ffca28; font-size: 14px; margin: 0 15px; }

        @media (max-width: 900px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <canvas id="snow-canvas"></canvas>
    <header class="header">
        <div class="title-group">
            <h1 class="page-title">NEVERBROKE GODMYHXND LIST</h1>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="SEARCH BY NAME...">
            </div>
        </div>
        <a href="index.html" class="back-btn">BACK</a>
    </header>

    <main class="cards-grid" id="cardsGrid">
        <div class="card" data-name="CO-FOUNDER NAME">
            <div class="card-logo"><img src="logo.png"></div>
            <div class="card-info">
                <p class="card-name">Aegonx Neverbroke Gmh</p>
                <p class="card-role">CO-FOUNDER</p>
                <a href="https://www.facebook.com/profile.php?id=61577571792218" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>
        </div>
    </main>

    <div class="pagination" id="paginationControls"></div>

    <script>
        // ใช้ Script เดียวกับหน้า Founder/Leader ได้เลย
        const allCards = Array.from(document.querySelectorAll('.card'));
        const searchInput = document.getElementById('searchInput');
        const paginationControls = document.getElementById('paginationControls');
        let currentPage = 1; const itemsPerPage = 12; let filteredCards = [...allCards];

        function updateDisplay() {
            allCards.forEach(card => card.classList.add('hidden'));
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredCards.slice(start, end);
            pageItems.forEach(card => card.classList.remove('hidden'));
            renderPagination();
        }

        function renderPagination() {
            const pageCount = Math.ceil(filteredCards.length / itemsPerPage);
            paginationControls.innerHTML = '';
            if (pageCount <= 1) { if(pageCount === 1) paginationControls.innerHTML = '<span class="page-info">PAGE 1 OF 1</span>'; return; }
            
            const createBtn = (text, action, disabled) => {
                const btn = document.createElement('button'); btn.innerHTML = text;
                btn.disabled = disabled; btn.onclick = action; return btn;
            };

            paginationControls.appendChild(createBtn('<<', () => { currentPage = 1; updateDisplay(); }, currentPage === 1));
            paginationControls.appendChild(createBtn('PREV', () => { currentPage--; updateDisplay(); }, currentPage === 1));
            const info = document.createElement('span'); info.className = 'page-info'; info.innerText = `PAGE ${currentPage} OF ${pageCount}`;
            paginationControls.appendChild(info);
            paginationControls.appendChild(createBtn('NEXT', () => { currentPage++; updateDisplay(); }, currentPage === pageCount));
            paginationControls.appendChild(createBtn('>>', () => { currentPage = pageCount; updateDisplay(); }, currentPage === pageCount));
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toUpperCase();
            filteredCards = allCards.filter(card => card.getAttribute('data-name').toUpperCase().startsWith(term));
            currentPage = 1; updateDisplay();
        });

        updateDisplay();

        // Snow Effect
        (function() {
            const canvas = document.getElementById('snow-canvas'); const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            function init() { resize(); window.addEventListener('resize', resize); for (let i = 0; i < 60; i++) particles.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5 + 0.2, sy: Math.random() * 0.8 + 0.4, sx: Math.random() * 0.4 - 0.2 }); animate(); }
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            function animate() { ctx.clearRect(0, 0, width, height); ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; particles.forEach(p => { p.y += p.sy; p.x += p.sx; if (p.y > height) p.y = -10; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); }); requestAnimationFrame(animate); }
            init();
        })();
    </script>

    <div id="music-player-container">
    <div id="track-info">[ LOADING SYSTEM... ]</div>
    <div class="player-controls">
        <button onclick="prevTrack()">PREV</button>
        <button id="playPauseBtn" onclick="togglePlayPause()">PAUSE</button>
        <button onclick="nextTrack()">NEXT</button>
    </div>
    <div class="volume-box">
        <span style="font-size: 8px; color: #666;">VOL</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>

<style>
    #music-player-container {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
        border-top: 1px solid #333; padding: 12px 0; z-index: 1000;
        font-family: 'Courier New', monospace; display: flex;
        flex-direction: column; align-items: center;
    }
    @media (min-width: 768px) {
        #music-player-container {
            width: 240px; bottom: 20px; right: 20px; left: auto;
            border: 1px solid #333; border-left: 3px solid #fff; padding: 15px;
        }
    }
    #track-info { font-size: 10px; color: #fff; margin-bottom: 8px; width: 90%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-controls { display: flex; gap: 10px; margin-bottom: 10px; }
    .player-controls button { background: none; border: 1px solid #444; color: #fff; cursor: pointer; font-size: 9px; padding: 4px 12px; }
    #playPauseBtn { background: #fff !important; color: #000 !important; border: none !important; font-weight: bold; }
    .volume-box { display: flex; align-items: center; gap: 10px; width: 80%; max-width: 250px; }
    input[type=range] { flex: 1; cursor: pointer; accent-color: #fff; }
</style>

<audio id="bgMusic" autoplay></audio>

<script>
    // 1. รายชื่อเพลง (ต้องเหมือนกันทุกหน้าเป๊ะๆ)
    const playlist = [
        { name: "PORZAX - แบบนั้นได้หรอ (MV)", src: "PORZAX -  MV (1).mp3" },
        { name: "PORZAX - ใครไม่รักแต่เค้ารัก", src: "PORZAX -     MV.mp3" },
        { name: "PORZAX - พอได้แล้ว (MV)", src: "PORZAX -  MV (2).mp3" },
        { name: "PORZAX - อย่ามาพูดถึงคำว่ารัก", src: "PORZAX - 2 (2).mp3" },
        { name: "PORZAX - ดอกไม้สีเทา Ft.Pondering", src: "PORZAX - .mp3" },
        { name: "PORZAX - สิ้นสุดความพยายาม ", src: "PORZAX - 2.mp3" },
        { name: "PORZAX - สิ้นสุดแรงรั้ง ", src: "PORZAX -    Special Version.mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  11(1).mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  FtRachYO.mp3" },
    ];

    let currentTrackIndex = parseInt(localStorage.getItem('godmy_musicIndex')) || 0;
    const music = document.getElementById('bgMusic');
    const trackInfo = document.getElementById('track-info');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    // ฟังก์ชันโหลดเพลง
    function loadTrack(index) {
        music.src = playlist[index].src;
        trackInfo.innerText = `[ PLAYING: ${playlist[index].name} ]`;
        localStorage.setItem('godmy_musicIndex', index);
    }

    // [หัวใจสำคัญ] บันทึกเวลาทันทีที่ User กำลังจะออกจากหน้า (รวมถึงกด Back)
    window.onbeforeunload = function() {
        localStorage.setItem('godmy_musicTime', music.currentTime);
        localStorage.setItem('godmy_paused', music.paused); // จำไว้ด้วยว่าเปิดหรือปิดเพลงอยู่
    };

    // สำรอง: บันทึกทุก 1 วินาทีกันเหนียว
    setInterval(() => {
        if (!music.paused) {
            localStorage.setItem('godmy_musicTime', music.currentTime);
        }
    }, 1000);

    function togglePlayPause() {
        if (music.paused) { 
            music.play(); 
            playPauseBtn.innerText = 'PAUSE'; 
        } else { 
            music.pause(); 
            playPauseBtn.innerText = 'PLAY'; 
        }
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0); // เริ่มเพลงใหม่จาก 0
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0);
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    music.onended = () => nextTrack();

    // ตั้งค่าระดับเสียง
    const savedVol = localStorage.getItem('godmy_volume');
    music.volume = savedVol ? parseFloat(savedVol) : 0.5;
    volumeSlider.value = music.volume;

    volumeSlider.oninput = (e) => { 
        music.volume = e.target.value; 
        localStorage.setItem('godmy_volume', e.target.value);
    };

    // เริ่มทำงานเมื่อโหลดหน้า
    window.addEventListener('load', () => {
        loadTrack(currentTrackIndex);
        
        // ดึงวินาทีล่าสุดจาก localStorage
        const savedTime = localStorage.getItem('godmy_musicTime');
        if (savedTime) {
            music.currentTime = parseFloat(savedTime);
        }

        // เช็คสถานะก่อนหน้า (ถ้า User กด Pause ไว้ก่อนไปหน้าอื่น ก็ไม่ต้อง Auto-play)
        const wasPaused = localStorage.getItem('godmy_paused') === 'true';

        if (!wasPaused) {
            let playAttempt = setInterval(() => {
                music.play().then(() => {
                    clearInterval(playAttempt);
                    playPauseBtn.innerText = 'PAUSE';
                }).catch(e => console.log("System Syncing Music..."));
            }, 600);
        } else {
            playPauseBtn.innerText = 'PLAY';
        }
    });
</script>
</body>
</html>
