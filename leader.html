<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader List - House of GODMYHXND</title>
    <style>
        /* --- CSS หลักสไตล์ Terminal/Cyberpunk --- */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* ฟอนต์พิมพ์ดีด */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas พายุหิมะแบบเบาบาง (Z-index -1) */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header ส่วนหัว --- */
        .header {
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .title-group {
            text-align: left;
        }

        /* หัวข้อหลัก LEADER LIST (ใช้สีฟ้า Cyan) */
        .page-title {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00fff9; /* สีฟ้าสไตล์ Cyberpunk */
            position: relative;
        }

        /* ช่องค้นหา (Search Bar) */
        .search-container {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            text-align: left;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .search-input:focus {
            border-color: #00fff9; /* เปลี่ยนสีขอบเมื่อโฟกัส */
            box-shadow: 0 0 10px rgba(0, 255, 249, 0.3);
        }

        /* ปุ่มย้อนกลับ BACK (สไตล์เดิม) */
        .back-btn {
            padding: 8px 20px;
            border: 1px solid #444;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
        }

        /* --- Grid Layout: แถวละ 3 คน --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* แบ่ง 3 คอลัมน์เท่ากัน */
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            padding: 40px 0;
            z-index: 5;
        }

        /* ปรับแต่งสำหรับมือถือ (แสดง 1 คอลัมน์) */
        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; flex-direction: column; gap: 15px; }
        }

        /* --- สไตล์การ์ดแบบ Cyberpunk/Terminal (ปรับจากสไตล์เดิม) --- */
        .card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #222;
            height: 140px;
            display: flex;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            transition: 0.3s ease;
        }

        /* ใช้สำหรับซ่อนการ์ดที่ไม่ตรงเงื่อนไขการค้นหา/แบ่งหน้า */
        .card.hidden {
            display: none !important;
        }

        /* เส้นขีดสีขาวด้านซ้าย (Glow สไตล์เดิม) */
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            width: 3px;
            height: 70%;
            background-color: #fff;
            opacity: 0.3;
            transition: 0.3s;
        }

        /* เอฟเฟกต์ Glow เวลา Hover การ์ด */
        .card:hover {
            border-color: #444;
            transform: translateY(-5px);
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            opacity: 1;
            box-shadow: 0 0 10px #fff;
        }

        /* รูปโลโก้ในการ์ด */
        .card-logo {
            width: 70px;
            height: 70px;
            background: #111;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .card-logo img {
            max-width: 80%;
            opacity: 0.7;
            filter: grayscale(100%); /* ทำรูปเป็นขาวดำ */
            transition: 0.3s;
        }

        .card:hover .card-logo img {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* รายละเอียดข้อความในการ์ด */
        .card-info {
            text-align: left;
        }

        .card-name {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            color: #fff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-role {
            font-size: 11px;
            color: #666;
            margin: 4px 0;
            text-transform: uppercase;
        }

        .view-profile {
            font-size: 11px;
            color: #00fff9; /* สีฟ้าให้เข้ากับหัวข้อหน้า */
            text-decoration: none;
            text-transform: uppercase;
            display: block;
            margin-top: 10px;
            transition: 0.2s;
        }

        .view-profile:hover {
            color: #fff;
            text-shadow: 0 0 5px #00fff9;
        }

        /* --- ส่วนของการแบ่งหน้า (Pagination) แบบ Prev/Next --- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 60px;
            z-index: 10;
        }
        
        .pagination button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #fff;
            color: #000;
        }
        
        .pagination button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .page-info {
            color: #00fff9; /* สีฟ้า */
            font-size: 14px;
            margin: 0 15px;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <header class="header">
        <div class="title-group">
            <h1 class="page-title">LEADER LIST</h1>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="SEARCH BY NAME...">
            </div>
        </div>
        <a href="index.html" class="back-btn">BACK</a>
    </header>

    <main class="cards-grid" id="cardsGrid">
        
        <div class="card" data-name="LEADER 01">
            <div class="card-logo">
                <img src="logo.png" alt="Logo"> </div>
            <div class="card-info">
                <p class="card-name">LEADER NAME 01</p>
                <p class="card-role">LEADER</p>
                <a href="#" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>
        </div>

        <div class="card" data-name="LEADER 02">
            <div class="card-logo">
                <img src="logo.png" alt="Logo"> </div>
            <div class="card-info">
                <p class="card-name">LEADER NAME 02</p>
                <p class="card-role">LEADER</p>
                <a href="#" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>
        </div>

        <div class="card" data-name="LEADER 03">
            <div class="card-logo">
                <img src="logo.png" alt="Logo"> </div>
            <div class="card-info">
                <p class="card-name">LEADER NAME 03</p>
                <p class="card-role">LEADER</p>
                <a href="#" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>
        </div>

        <div class="card" data-name="LEADER 04">
            <div class="card-logo"><img src="logo.png"></div>
            <div class="card-info">
                <p class="card-name">LEADER NAME 04</p>
                <p class="card-role">LEADER</p>
                <a href="#" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>
        </div>
        
        </main>

    <div class="pagination" id="paginationControls"></div>

    <script>
        // --- ระบบ Pagination และ Search (เหมือนหน้า Founder) ---
        const cardsGrid = document.getElementById('cardsGrid');
        const allCards = Array.from(document.querySelectorAll('.card'));
        const searchInput = document.getElementById('searchInput');
        const paginationControls = document.getElementById('paginationControls');

        let currentPage = 1;
        const itemsPerPage = 12; // 1 หน้ามี 12 คน (4 แถว แถวละ 3 คน)
        let filteredCards = [...allCards];

        function updateDisplay() {
            // ซ่อนการ์ดทั้งหมดก่อน
            allCards.forEach(card => card.classList.add('hidden'));

            // คำนวณช่วงข้อมูลที่จะแสดง
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredCards.slice(start, end);

            // แสดงเฉพาะการ์ดในหน้านั้น
            pageItems.forEach(card => card.classList.remove('hidden'));

            renderPagination();
        }

        function renderPagination() {
            const pageCount = Math.ceil(filteredCards.length / itemsPerPage);
            paginationControls.innerHTML = '';

            // ถ้าไม่มีข้อมูล หรือมีแค่หน้าเดียว ไม่ต้องแสดงปุ่มที่ซับซ้อน
            if (pageCount <= 1) {
                if (pageCount === 1) {
                    paginationControls.innerHTML = '<span class="page-info">PAGE 1 OF 1</span>';
                }
                return;
            }

            // ปุ่มแรกสุด (First)
            const firstBtn = document.createElement('button');
            firstBtn.innerHTML = '<<';
            firstBtn.disabled = currentPage === 1;
            firstBtn.onclick = () => { currentPage = 1; updateDisplay(); };
            paginationControls.appendChild(firstBtn);

            // ปุ่มย้อนกลับ (Prev)
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = 'PREV';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; updateDisplay(); };
            paginationControls.appendChild(prevBtn);

            // แสดงเลขหน้าปัจจุบัน (Current / Total)
            const info = document.createElement('span');
            info.className = 'page-info';
            info.innerText = `PAGE ${currentPage} OF ${pageCount}`;
            paginationControls.appendChild(info);

            // ปุ่มไปหน้า (Next)
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = 'NEXT';
            nextBtn.disabled = currentPage === pageCount;
            nextBtn.onclick = () => { currentPage++; updateDisplay(); };
            paginationControls.appendChild(nextBtn);

            // ปุ่มสุดท้าย (Last)
            const lastBtn = document.createElement('button');
            lastBtn.innerHTML = '>>';
            lastBtn.disabled = currentPage === pageCount;
            lastBtn.onclick = () => { currentPage = pageCount; updateDisplay(); };
            paginationControls.appendChild(lastBtn);
        }

        // ระบบค้นหา (Search Logic)
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toUpperCase(); // รับค่าที่พิมพ์และเปลี่ยนเป็นตัวใหญ่
            
            // กรองข้อมูลตามชื่อ
            filteredCards = allCards.filter(card => {
                const name = card.getAttribute('data-name').toUpperCase();
                return name.startsWith(term); // ค้นหาเฉพาะคนที่ชื่อขึ้นต้นด้วยคำที่พิมพ์
            });
            
            currentPage = 1; // เวลากรองใหม่ ให้กลับไปหน้า 1 เสมอ
            updateDisplay();
        });

        // เริ่มต้นการแสดงผล
        updateDisplay();

        // --- ระบบหิมะ (เบาบาง) ---
        (function() {
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            
            function init() {
                resize();
                window.addEventListener('resize', resize);
                // สร้างเกล็ดหิมะ 60 เกล็ด
                for (let i = 0; i < 60; i++) particles.push({
                    x: Math.random() * innerWidth, y: Math.random() * innerHeight,
                    r: Math.random() * 1.2 + 0.3, // ขนาดเกล็ด
                    sy: Math.random() * 0.8 + 0.4, // ความเร็วตก (ช้าๆ)
                    sx: Math.random() * 0.4 - 0.2  // ลมพัดออกข้างเล็กน้อย
                });
                animate();
            }
            
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            
            function animate() {
                ctx.clearRect(0, 0, width, height);
                // สีเกล็ดหิมะขาวจางๆ
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                particles.forEach(p => {
                    p.y += p.sy; p.x += p.sx;
                    // เมื่อตกพ้นหน้าจอ ให้กลับไปเริ่มด้านบนใหม่
                    if (p.y > height) p.y = -10;
                    if (p.x > width) p.x = 0; else if (p.x < 0) p.x = width;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            init();
        })();
    </script>

    <div id="music-player-container">
    <div id="track-info">[ LOADING SYSTEM... ]</div>
    <div class="player-controls">
        <button onclick="prevTrack()">PREV</button>
        <button id="playPauseBtn" onclick="togglePlayPause()">PAUSE</button>
        <button onclick="nextTrack()">NEXT</button>
    </div>
    <div class="volume-box">
        <span style="font-size: 8px; color: #666;">VOL</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>

<style>
    #music-player-container {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
        border-top: 1px solid #333; padding: 12px 0; z-index: 1000;
        font-family: 'Courier New', monospace; display: flex;
        flex-direction: column; align-items: center;
    }
    @media (min-width: 768px) {
        #music-player-container {
            width: 240px; bottom: 20px; right: 20px; left: auto;
            border: 1px solid #333; border-left: 3px solid #fff; padding: 15px;
        }
    }
    #track-info { font-size: 10px; color: #fff; margin-bottom: 8px; width: 90%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-controls { display: flex; gap: 10px; margin-bottom: 10px; }
    .player-controls button { background: none; border: 1px solid #444; color: #fff; cursor: pointer; font-size: 9px; padding: 4px 12px; }
    #playPauseBtn { background: #fff !important; color: #000 !important; border: none !important; font-weight: bold; }
    .volume-box { display: flex; align-items: center; gap: 10px; width: 80%; max-width: 250px; }
    input[type=range] { flex: 1; cursor: pointer; accent-color: #fff; }
</style>

<audio id="bgMusic" autoplay></audio>

<script>
    // 1. รายชื่อเพลง (ต้องเหมือนกันทุกหน้าเป๊ะๆ)
    const playlist = [
        { name: "PORZAX - แบบนั้นได้หรอ (MV)", src: "mp3/PORZAX -  MV (1).mp3" },
        { name: "TRACK 02", src: "track2.mp3" },
        { name: "TRACK 03", src: "track3.mp3" }
    ];

    let currentTrackIndex = parseInt(localStorage.getItem('godmy_musicIndex')) || 0;
    const music = document.getElementById('bgMusic');
    const trackInfo = document.getElementById('track-info');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    // ฟังก์ชันโหลดเพลง
    function loadTrack(index) {
        music.src = playlist[index].src;
        trackInfo.innerText = `[ PLAYING: ${playlist[index].name} ]`;
        localStorage.setItem('godmy_musicIndex', index);
    }

    // [หัวใจสำคัญ] บันทึกเวลาทันทีที่ User กำลังจะออกจากหน้า (รวมถึงกด Back)
    window.onbeforeunload = function() {
        localStorage.setItem('godmy_musicTime', music.currentTime);
        localStorage.setItem('godmy_paused', music.paused); // จำไว้ด้วยว่าเปิดหรือปิดเพลงอยู่
    };

    // สำรอง: บันทึกทุก 1 วินาทีกันเหนียว
    setInterval(() => {
        if (!music.paused) {
            localStorage.setItem('godmy_musicTime', music.currentTime);
        }
    }, 1000);

    function togglePlayPause() {
        if (music.paused) { 
            music.play(); 
            playPauseBtn.innerText = 'PAUSE'; 
        } else { 
            music.pause(); 
            playPauseBtn.innerText = 'PLAY'; 
        }
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0); // เริ่มเพลงใหม่จาก 0
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0);
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    music.onended = () => nextTrack();

    // ตั้งค่าระดับเสียง
    const savedVol = localStorage.getItem('godmy_volume');
    music.volume = savedVol ? parseFloat(savedVol) : 0.5;
    volumeSlider.value = music.volume;

    volumeSlider.oninput = (e) => { 
        music.volume = e.target.value; 
        localStorage.setItem('godmy_volume', e.target.value);
    };

    // เริ่มทำงานเมื่อโหลดหน้า
    window.addEventListener('load', () => {
        loadTrack(currentTrackIndex);
        
        // ดึงวินาทีล่าสุดจาก localStorage
        const savedTime = localStorage.getItem('godmy_musicTime');
        if (savedTime) {
            music.currentTime = parseFloat(savedTime);
        }

        // เช็คสถานะก่อนหน้า (ถ้า User กด Pause ไว้ก่อนไปหน้าอื่น ก็ไม่ต้อง Auto-play)
        const wasPaused = localStorage.getItem('godmy_paused') === 'true';

        if (!wasPaused) {
            let playAttempt = setInterval(() => {
                music.play().then(() => {
                    clearInterval(playAttempt);
                    playPauseBtn.innerText = 'PAUSE';
                }).catch(e => console.log("System Syncing Music..."));
            }, 600);
        } else {
            playPauseBtn.innerText = 'PLAY';
        }
    });
</script>

</body>
</html>
