<!DOCTYPE html>

    <style>
        /* --- CSS หลักสไตล์ Terminal --- */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #snow-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header --- */
        .header {
            width: 100%;
            padding: 30px 50px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        /* หัวข้อหน้า MEMBER (ใช้สีขาวสว่าง White Glow) */
        .page-title {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .search-container {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            outline: none;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .back-btn {
            padding: 8px 20px;
            border: 1px solid #444;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            transition: 0.3s;
        }

        .back-btn:hover { background: #fff; color: #000; }

        /* --- Grid Layout: แถวละ 3 คน --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            padding: 40px 0;
            z-index: 5;
        }

        .card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #222;
            height: 140px;
            display: flex;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            transition: 0.3s;
        }

        .card.hidden { display: none !important; }

        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; width: 3px; height: 70%;
            background-color: #fff;
            opacity: 0.1;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #555;
            transform: translateY(-5px);
            background: rgba(30, 30, 30, 0.9);
        }

        .card:hover::before { opacity: 1; box-shadow: 0 0 10px #fff; }

        .card-logo {
            width: 70px; height: 70px;
            background: #111;
            border: 1px solid #333;
            margin-right: 20px;
            flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
        }

        .card-logo img {
            max-width: 80%;
            opacity: 0.6;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .card:hover .card-logo img { opacity: 1; filter: grayscale(0%); }

        .card-name {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            color: #fff;
            text-transform: uppercase;
        }

        .card-role {
            font-size: 10px;
            color: #555;
            margin: 4px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .view-profile {
            font-size: 11px;
            color: #888; /* สีเทาสำหรับ Member */
            text-decoration: none;
            margin-top: 10px;
            display: block;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .view-profile:hover { color: #fff; text-decoration: underline; }

        /* --- Pagination --- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 60px;
            z-index: 10;
        }
        
        .pagination button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: 0.3s;
        }
        
        .pagination button:hover:not(:disabled) { background: #fff; color: #000; }
        .pagination button:disabled { opacity: 0.2; cursor: not-allowed; }

        .page-info {
            color: #888;
            font-size: 13px;
            margin: 0 15px;
        }

        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header { padding: 20px; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

        <div class="card" data-name="MEMBER NAME 02">
            <div class="card-logo"><img src="logo.png"></div>

                <p class="card-name">Haru Godmyhxnd</p>
                <p class="card-role">MEMBER</p>
                <a href="https://www.facebook.com/share/18MsgCWwya/?mibextid=wwXIfr" class="view-profile" target="_blank">VIEW PROFILE</a>
            </div>

        <div class="card" data-name="MEMBER NAME 02">

            <div class="card-info">
                <p class="card-name">Pluto Charisma</p>
                <p class="card-role">MEMBER</p>

        </main>

    <div class="pagination" id="paginationControls"></div>

    <script>
        // --- Logic: Pagination & Search ---
        const allCards = Array.from(document.querySelectorAll('.card'));
        const searchInput = document.getElementById('searchInput');
        const paginationControls = document.getElementById('paginationControls');

        let currentPage = 1;
        const itemsPerPage = 12; 
        let filteredCards = [...allCards];

        function updateDisplay() {
            allCards.forEach(card => card.classList.add('hidden'));
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredCards.slice(start, end);
            pageItems.forEach(card => card.classList.remove('hidden'));
            renderPagination();
        }

        function renderPagination() {
            const pageCount = Math.ceil(filteredCards.length / itemsPerPage);
            paginationControls.innerHTML = '';
            if (pageCount <= 1) {
                if (pageCount === 1) paginationControls.innerHTML = '<span class="page-info">PAGE 1 OF 1</span>';
                return;
            }

            const firstBtn = document.createElement('button');
            firstBtn.innerHTML = '<<';
            firstBtn.disabled = currentPage === 1;
            firstBtn.onclick = () => { currentPage = 1; updateDisplay(); };
            paginationControls.appendChild(firstBtn);

            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = 'PREV';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; updateDisplay(); };
            paginationControls.appendChild(prevBtn);

            const info = document.createElement('span');
            info.className = 'page-info';
            info.innerText = `PAGE ${currentPage} OF ${pageCount}`;
            paginationControls.appendChild(info);

            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = 'NEXT';
            nextBtn.disabled = currentPage === pageCount;
            nextBtn.onclick = () => { currentPage++; updateDisplay(); };
            paginationControls.appendChild(nextBtn);

            const lastBtn = document.createElement('button');
            lastBtn.innerHTML = '>>';
            lastBtn.disabled = currentPage === pageCount;
            lastBtn.onclick = () => { currentPage = pageCount; updateDisplay(); };
            paginationControls.appendChild(lastBtn);
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toUpperCase();
            filteredCards = allCards.filter(card => {
                const name = card.getAttribute('data-name').toUpperCase();
                return name.startsWith(term);
            });
            currentPage = 1;
            updateDisplay();
        });

        updateDisplay();

        // --- Snow Effect ---
        (function() {
            const canvas = document.getElementById('snow-canvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            function init() {
                resize();
                window.addEventListener('resize', resize);
                for (let i = 0; i < 60; i++) particles.push({
                    x: Math.random() * innerWidth, y: Math.random() * innerHeight,
                    r: Math.random() * 1.2 + 0.3, sy: Math.random() * 0.8 + 0.4, sx: Math.random() * 0.4 - 0.2
                });
                animate();
            }
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                particles.forEach(p => {
                    p.y += p.sy; p.x += p.sx;
                    if (p.y > height) p.y = -10;
                    if (p.x > width) p.x = 0; else if (p.x < 0) p.x = width;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            init();
        })();
    </script>

    <div id="music-player-container">
    <div id="track-info">[ LOADING SYSTEM... ]</div>
    <div class="player-controls">
        <button onclick="prevTrack()">PREV</button>
        <button id="playPauseBtn" onclick="togglePlayPause()">PAUSE</button>
        <button onclick="nextTrack()">NEXT</button>
    </div>
    <div class="volume-box">
        <span style="font-size: 8px; color: #666;">VOL</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
</div>

<style>
    #music-player-container {
        position: fixed; bottom: 0; left: 0; width: 100%;
        background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px);
        border-top: 1px solid #333; padding: 12px 0; z-index: 1000;
        font-family: 'Courier New', monospace; display: flex;
        flex-direction: column; align-items: center;
    }
    @media (min-width: 768px) {
        #music-player-container {
            width: 240px; bottom: 20px; right: 20px; left: auto;
            border: 1px solid #333; border-left: 3px solid #fff; padding: 15px;
        }
    }
    #track-info { font-size: 10px; color: #fff; margin-bottom: 8px; width: 90%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-controls { display: flex; gap: 10px; margin-bottom: 10px; }
    .player-controls button { background: none; border: 1px solid #444; color: #fff; cursor: pointer; font-size: 9px; padding: 4px 12px; }
    #playPauseBtn { background: #fff !important; color: #000 !important; border: none !important; font-weight: bold; }
    .volume-box { display: flex; align-items: center; gap: 10px; width: 80%; max-width: 250px; }
    input[type=range] { flex: 1; cursor: pointer; accent-color: #fff; }
</style>

<audio id="bgMusic" autoplay></audio>

<script>
    // 1. รายชื่อเพลง (ต้องเหมือนกันทุกหน้าเป๊ะๆ)
    const playlist = [
        { name: "PORZAX - แบบนั้นได้หรอ (MV)", src: "PORZAX -  MV (1).mp3" },
        { name: "PORZAX - ใครไม่รักแต่เค้ารัก", src: "PORZAX -    MV.mp3" },
        { name: "PORZAX - พอได้แล้ว (MV)", src: "PORZAX -  MV (2).mp3" },
        { name: "PORZAX - อย่ามาพูดถึงคำว่ารัก", src: "PORZAX - 2 (2).mp3" },
        { name: "PORZAX - ดอกไม้สีเทา Ft.Pondering", src: "PORZAX - .mp3" },
        { name: "PORZAX - สิ้นสุดความพยายาม ", src: "PORZAX - 2.mp3" },
        { name: "PORZAX - สิ้นสุดแรงรั้ง ", src: "PORZAX -    Special Version.mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  11(1).mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  FtRachYO.mp3" },
    ];

    let currentTrackIndex = parseInt(localStorage.getItem('godmy_musicIndex')) || 0;
    const music = document.getElementById('bgMusic');
    const trackInfo = document.getElementById('track-info');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    // ฟังก์ชันโหลดเพลง
    function loadTrack(index) {
        music.src = playlist[index].src;
        trackInfo.innerText = `[ PLAYING: ${playlist[index].name} ]`;
        localStorage.setItem('godmy_musicIndex', index);
    }

    // [หัวใจสำคัญ] บันทึกเวลาทันทีที่ User กำลังจะออกจากหน้า (รวมถึงกด Back)
    window.onbeforeunload = function() {
        localStorage.setItem('godmy_musicTime', music.currentTime);
        localStorage.setItem('godmy_paused', music.paused); // จำไว้ด้วยว่าเปิดหรือปิดเพลงอยู่
    };

    // สำรอง: บันทึกทุก 1 วินาทีกันเหนียว
    setInterval(() => {
        if (!music.paused) {
            localStorage.setItem('godmy_musicTime', music.currentTime);
        }
    }, 1000);

    function togglePlayPause() {
        if (music.paused) { 
            music.play(); 
            playPauseBtn.innerText = 'PAUSE'; 
        } else { 
            music.pause(); 
            playPauseBtn.innerText = 'PLAY'; 
        }
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0); // เริ่มเพลงใหม่จาก 0
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0);
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    music.onended = () => nextTrack();

    // ตั้งค่าระดับเสียง
    const savedVol = localStorage.getItem('godmy_volume');
    music.volume = savedVol ? parseFloat(savedVol) : 0.5;
    volumeSlider.value = music.volume;

    volumeSlider.oninput = (e) => { 
        music.volume = e.target.value; 
        localStorage.setItem('godmy_volume', e.target.value);
    };

    // เริ่มทำงานเมื่อโหลดหน้า
    window.addEventListener('load', () => {
        loadTrack(currentTrackIndex);
        
        // ดึงวินาทีล่าสุดจาก localStorage
        const savedTime = localStorage.getItem('godmy_musicTime');
        if (savedTime) {
            music.currentTime = parseFloat(savedTime);
        }

        // เช็คสถานะก่อนหน้า (ถ้า User กด Pause ไว้ก่อนไปหน้าอื่น ก็ไม่ต้อง Auto-play)
        const wasPaused = localStorage.getItem('godmy_paused') === 'true';

        if (!wasPaused) {
            let playAttempt = setInterval(() => {
                music.play().then(() => {
                    clearInterval(playAttempt);
                    playPauseBtn.innerText = 'PAUSE';
                }).catch(e => console.log("System Syncing Music..."));
            }, 600);
        } else {
            playPauseBtn.innerText = 'PLAY';
        }
    });
</script>
</body>
