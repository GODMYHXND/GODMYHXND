<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of GODMYHXND</title>
    <style>
        /* --- CSS หลัก --- */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* --- เอฟเฟกต์พายุหิมะ --- */
        #snow-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            z-index: 1;
            padding-bottom: 120px; /* เว้นพื้นที่ให้ Player ในมือถือ */
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-container {
            margin-bottom: 50px;
            animation: flicker-img 4s infinite;
        }

        .logo-image {
            max-width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
            opacity: 0.9;
        }

        @keyframes flicker-img {
            0%, 100% { opacity: 0.9; }
            5% { opacity: 0.3; }
            10% { opacity: 1; }
            70% { opacity: 0.9; }
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: block;
            width: 280px;
            padding: 12px;
            border: 1px solid #333333;
            color: #ffffff;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.2s;
            background-color: transparent;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }

        /* --- Music Player UI --- */
        #music-player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            border-top: 1px solid #333;
            padding: 12px 0;
            z-index: 1000;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (min-width: 768px) {
            #music-player-container {
                width: 240px;
                bottom: 20px;
                right: 20px;
                left: auto;
                border: 1px solid #333;
                border-left: 3px solid #fff;
                padding: 15px;
            }
            .container { padding-bottom: 0; }
        }

        #track-info {
            font-size: 9px;
            color: #fff;
            margin-bottom: 8px;
            width: 90%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .player-controls button {
            background: none; border: 1px solid #444; color: #fff;
            cursor: pointer; font-size: 9px; padding: 4px 12px;
        }
        #playPauseBtn { background: #fff !important; color: #000 !important; font-weight: bold; }
        
        .volume-box { display: flex; align-items: center; gap: 10px; width: 80%; max-width: 200px; }
        input[type=range] { flex: 1; cursor: pointer; accent-color: #fff; }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="container">
        <h1 class="title">House of GODMYHXND</h1>
        <div class="logo-container">
            <img src="image-removebg-preview (1).png" alt="GODMYHXND Logo" class="logo-image">
        </div>
        <div class="button-container">
            <a href="founder.html" class="btn">FOUNDER GODMYHXND</a>
            <a href="co-founder.html" class="btn">NEVERBROKE GODMYHXND</a> 
            <a href="leader.html" class="btn">LEADER GODMYHXND</a>
            <a href="member.html" class="btn">MEMBER GODMYHXND</a>
        </div>
    </div>

    <div id="music-player-container">
        <div id="track-info">[ SYSTEM LOADING... ]</div>
        <div class="player-controls">
            <button onclick="prevTrack()">PREV</button>
            <button id="playPauseBtn" onclick="togglePlayPause()">PAUSE</button>
            <button onclick="nextTrack()">NEXT</button>
        </div>
        <div class="volume-box">
            <span style="font-size: 8px; color: #666;">VOL</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <audio id="bgMusic" autoplay></audio>

    <script>
    // --- 1. Script พายุหิมะ ---
    (function() {
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function init() {
            resize();
            window.addEventListener('resize', resize);
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 0.5,
                    sy: Math.random() * 3 + 1,
                    sx: Math.random() * 2 - 1
                });
            }
            animate();
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            particles.forEach(p => {
                p.y += p.sy; p.x += p.sx;
                if (p.y > height) p.y = -10;
                if (p.x > width) p.x = 0; else if (p.x < 0) p.x = width;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        init();
    })();

    // --- 2. Script ระบบเพลง ---
    const playlist = [
        { name: "PORZAX - แบบนั้นได้หรอ (MV)", src: "PORZAX -  MV (1).mp3" },
        { name: "PORZAX - ใครไม่รักแต่เค้ารัก", src: "PORZAX -    MV.mp3" },
        { name: "PORZAX - พอได้แล้ว (MV)", src: "PORZAX -  MV (2).mp3" },
        { name: "PORZAX - อย่ามาพูดถึงคำว่ารัก", src: "PORZAX - 2 (2).mp3" },
        { name: "PORZAX - ดอกไม้สีเทา Ft.Pondering", src: "PORZAX - .mp3" },
        { name: "PORZAX - สิ้นสุดความพยายาม ", src: "PORZAX - 2.mp3" },
        { name: "PORZAX - สิ้นสุดแรงรั้ง ", src: "PORZAX -    Special Version.mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  11(1).mp3" },
        { name: "PORZAX - PORZAX - รักร้ายท้ายสุด ", src: "PORZAX -  FtRachYO.mp3" },
    ];

    let currentTrackIndex = parseInt(localStorage.getItem('godmy_musicIndex')) || 0;
    const music = document.getElementById('bgMusic');
    const trackInfo = document.getElementById('track-info');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    function loadTrack(index) {
        if (playlist[index]) {
            music.src = playlist[index].src;
            trackInfo.innerText = `[ PLAYING: ${playlist[index].name} ]`;
            localStorage.setItem('godmy_musicIndex', index);
        }
    }

    window.onbeforeunload = function() {
        localStorage.setItem('godmy_musicTime', music.currentTime);
        localStorage.setItem('godmy_paused', music.paused);
    };

    function togglePlayPause() {
        if (music.paused) { music.play(); playPauseBtn.innerText = 'PAUSE'; }
        else { music.pause(); playPauseBtn.innerText = 'PLAY'; }
    }

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0);
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        localStorage.setItem('godmy_musicTime', 0);
        loadTrack(currentTrackIndex);
        music.play();
        playPauseBtn.innerText = 'PAUSE';
    }

    music.onended = () => nextTrack();

    window.addEventListener('load', () => {
        loadTrack(currentTrackIndex);
        const savedTime = localStorage.getItem('godmy_musicTime');
        if (savedTime) music.currentTime = parseFloat(savedTime);
        
        const savedVol = localStorage.getItem('godmy_volume');
        music.volume = savedVol ? parseFloat(savedVol) : 0.5;
        volumeSlider.value = music.volume;

        if (localStorage.getItem('godmy_paused') !== 'true') {
            let attempt = setInterval(() => {
                music.play().then(() => {
                    clearInterval(attempt);
                    playPauseBtn.innerText = 'PAUSE';
                }).catch(() => {});
            }, 600);
        } else {
            playPauseBtn.innerText = 'PLAY';
        }
    });

    volumeSlider.oninput = (e) => {
        music.volume = e.target.value;
        localStorage.setItem('godmy_volume', e.target.value);
    };
    </script>
</body>
</html>
